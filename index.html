<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogepepe Mini App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    body {
      background-color: #0f131c;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: space-between;
      overflow: hidden;
    }

    /* Top Stats Grid */
    .top-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 15px 5px 15px;
    }

    .stat-card {
      background: #1c212e;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      border: 1px solid #2a3142;
    }

    .stat-title {
      font-size: 10px;
      color: #8b94a0;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .val-orange { color: #f39c12; }
    .val-blue { color: #3498db; }
    .val-green { color: #2ecc71; }

    /* Total Supply Banner (Separated) */
    .total-supply-box {
      margin: 5px 15px 10px 15px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed #2ecc71;
      border-radius: 8px;
      padding: 6px;
      text-align: center;
      font-size: 12px;
      color: #a0a6b2;
    }

    .total-supply-box span {
      color: #2ecc71;
      font-weight: bold;
      font-size: 14px;
    }

    /* Main Balance & Level */
    .main-section {
      text-align: center;
      padding: 0 20px;
    }

    .balance-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .coin-icon {
      width: 40px;
      height: 40px;
      background: #f1c40f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #000;
      box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
    }

    .balance-amount {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* Level & Progress Bar */
    .level-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 5px;
      color: #a0a6b2;
      padding: 0 5px;
    }

    .progress-bar-bg {
      background: #252a38;
      height: 8px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress-bar-fill {
      background: linear-gradient(90deg, #4b6cb7, #182848);
      width: 60%;
      height: 100%;
    }

    /* Tap Character Circle */
    .tap-area {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 5px 0;
    }

    .tap-circle {
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: radial-gradient(circle, #2e7d32 0%, #0f131c 70%);
      border: 4px solid #4caf50;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 25px rgba(76, 175, 80, 0.4);
      cursor: pointer;
      transition: transform 0.05s ease;
    }

    .tap-circle:active {
      transform: scale(0.96);
    }

    .tap-circle img {
      width: 130px;
      height: 130px;
    }

    /* Energy & Boost */
    .energy-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 25px;
      margin-top: 5px;
    }

    .energy-text {
      font-size: 15px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .boost-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: none;
      color: #ffffff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Bottom Navigation Bar */
    .navbar {
      background: #161a23;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 12px 0;
      border-top: 1px solid #232836;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: #6c757d;
      font-size: 11px;
      text-decoration: none;
    }

    .nav-item.active {
      color: #f1c40f;
    }

    .nav-icon {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- Top 3 Stats Cards -->
  <div class="top-stats">
    <div class="stat-card">
      <div class="stat-title">Earn per tap</div>
      <div class="stat-value val-orange">🪙 +10</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Coins to level up</div>
      <div class="stat-value val-blue">10M</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">Profit per hour</div>
      <div class="stat-value val-green">🪙 +39.12K</div>
    </div>
  </div>

  <!-- Separate Total Supply Box -->
  <div class="total-supply-box">
    Total Supply: <span id="total-supply">420M</span>
  </div>

  <!-- Main Balance Section (Current Earned Coins) -->
  <div class="main-section">
    <div class="balance-container">
      <div class="coin-icon">$</div>
      <div class="balance-amount" id="coin-count">0</div>
    </div>

    <!-- Level Progress -->
    <div class="level-info">
      <span>Epic &gt;</span>
      <span>Level <b>6/10</b></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
  </div>

  <!-- Tap Frog Character -->
  <div class="tap-area">
    <div class="tap-circle" id="tap-btn">
      <img src="https://emojiisland.com/cdn/shop/products/Frog_Emoji_icon_4f84a00e-269d-4a01-a080-82a176880004_large.png" alt="Dogepepe">
    </div>
  </div>

  <!-- Energy & Boost -->
  <div class="energy-container">
    <div class="energy-text">
      ⚡ <span id="energy">1000</span> / 1000
    </div>
    <button class="boost-btn">
      🚀 Boost
    </button>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="navbar">
    <div class="nav-item active">
      <span class="nav-icon">🔥</span>
      <span>Exchange</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⛏️</span>
      <span>Mine</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">👥</span>
      <span>Friends</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">💰</span>
      <span>Earn</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">🪙</span>
      <span>Airdrop</span>
    </div>
  </div>

  <!-- Tap Logic -->
  <script>
    let coins = 0;
    let energy = 1000;

    const coinCountEl = document.getElementById('coin-count');
    const energyEl = document.getElementById('energy');
    const tapBtn = document.getElementById('tap-btn');

    tapBtn.addEventListener('click', () => {
      if (energy >= 10) {
        coins += 10;
        energy -= 10;
        coinCountEl.innerText = coins.toLocaleString();
        energyEl.innerText = energy;
      }
    });
  </script>
</body>
</html>
