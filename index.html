
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Doge Pepe Tap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header Metrics -->
    <div class="stats-card">
      <div class="stat-box">
        <span class="stat-label">Total Supply</span>
        <span class="stat-value">420M</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Profit / Hour</span>
        <span class="stat-value" id="pph">+0</span>
      </div>
    </div>

    <!-- Main Balance -->
    <div class="balance-container">
      <img src="https://cryptologos.cc/logos/pepe-pepe-logo.png" alt="Coin" class="coin-icon">
      <h1 id="score">0</h1>
    </div>

    <!-- Tap Area -->
    <div class="tap-area">
      <button id="tap-btn">🐸</button>
    </div>

    <!-- Energy & Upgrades -->
    <div class="footer-stats">
      <div class="energy-bar-container">
        ⚡ <span id="energy">1000</span> / 1000
      </div>
      <button id="upgrade-btn" class="upgrade-btn">
        🚀 Upgrade PPH (Cost: <span id="upgrade-cost">50</span>)
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
