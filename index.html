<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dogepepe Tap App</title>
  
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- TONConnect SDK -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #0b101b;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Stats */
    .top-stats {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      gap: 10px;
    }

    .stat-card {
      background: #141c2b;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
      flex: 1;
    }

    .stat-label {
      font-size: 10px;
      color: #64748b;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-val {
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
    }

    .val-green { color: #10b981; }

    /* Est Value Banner */
    .est-banner {
      background: linear-gradient(90deg, #3b2a08, #2a1f05);
      border: 1px solid #f59e0b;
      border-radius: 20px;
      margin: 0 12px 10px;
      padding: 6px 12px;
      text-align: center;
      font-size: 11px;
      color: #fbbf24;
      font-weight: bold;
    }

    /* Main Balance Display */
    .balance-container {
      text-align: center;
      margin-top: 5px;
    }

    .balance-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .balance-val {
      font-size: 38px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 2px;
    }

    /* Tap Target Area */
    .tap-area-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
    }

    .tap-area {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, rgba(0,0,0,0) 70%);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
      cursor: pointer;
    }

    .tap-coin-img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      transition: transform 0.05s ease;
    }

    .tap-coin-img:active {
      transform: scale(0.95);
    }

    /* Floating Tap Animation */
    .floating-num {
      position: absolute;
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-70px); }
    }

    /* Bottom Info Card Area */
    .bottom-section {
      padding: 0 12px 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .energy-bar-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: bold;
    }

    .invite-card {
      background: #141c2b;
      border: 1px dashed #223046;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .invite-title {
      font-size: 13px;
      font-weight: bold;
    }

    .invite-sub {
      font-size: 10px;
      color: #10b981;
      margin-top: 2px;
    }

    .btn-invite {
      background: #f59e0b;
      color: #000000;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-upgrade {
      background: #f59e0b;
      color: #000000;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>

  <!-- Top Stats -->
  <div class="top-stats">
    <div class="stat-card">
      <div class="stat-label">Total Supply</div>
      <div class="stat-val">420M</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Profit / Hour</div>
      <div class="stat-val val-green">+<span id="pph-val">0</span></div>
    </div>
  </div>

  <!-- Value Banner -->
  <div class="est-banner">
    🔥 Est. Value: 1,000,000 Coins ≈ $200 USD
  </div>

  <!-- Total Balance -->
  <div class="balance-container">
    <div class="balance-label">Total Balance</div>
    <div class="balance-val">
      <span>🐸</span>
      <span id="coin-count">0</span>
    </div>
  </div>

  <!-- Tap Main Coin Area -->
  <div class="tap-area-wrapper">
    <div class="tap-area" id="tap-target">
      <img src="dogepepe.png" alt="Dogepepe Coin" class="tap-coin-img">
    </div>
  </div>

  <!-- Bottom Section -->
  <div class="bottom-section">
    <div class="energy-bar-info">
      <span style="color:#f59e0b;"><i class="fa-solid fa-bolt"></i> Energy</span>
      <span><span id="energy-count">1000</span> / 1000</span>
    </div>

    <!-- Hamster Style Invite Box -->
    <div class="invite-card">
      <div>
        <div class="invite-title">👥 Invite 1 Friend</div>
        <div class="invite-sub">Get +1,000,000 Coins ($200)</div>
      </div>
      <button class="btn-invite" onclick="shareReferralLink()">Invite</button>
    </div>

    <button class="btn-upgrade" onclick="upgradePPH()">
      🚀 Upgrade PPH (Cost: 50)
    </button>
  </div>

  <script>
    // 1. Telegram Mini-App Setup
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    // Telegram User Info Fix for Link Generation
    const userTelegramId = tg?.initDataUnsafe?.user?.id || "user" + Math.floor(Math.random() * 10000);
    const BOT_USERNAME = "DogepepeBot"; // Yahan apne Telegram Bot ka username write karein

    // 2. Persistent LocalStorage Data Handler
    let coins = parseInt(localStorage.getItem('dogepepe_coins')) || 0;
    let energy = parseInt(localStorage.getItem('dogepepe_energy')) || 1000;
    let pph = parseInt(localStorage.getItem('dogepepe_pph')) || 0;

    const coinsEl = document.getElementById('coin-count');
    const energyEl = document.getElementById('energy-count');
    const pphEl = document.getElementById('pph-val');
    const tapTarget = document.getElementById('tap-target');

    // Display loaded values
    coinsEl.innerText = coins.toLocaleString();
    energyEl.innerText = energy;
    pphEl.innerText = pph.toLocaleString();

    // Function to save state permanently
    function saveData() {
      localStorage.setItem('dogepepe_coins', coins);
      localStorage.setItem('dogepepe_energy', energy);
      localStorage.setItem('dogepepe_pph', pph);
    }

    // 3. Tap Mechanics
    tapTarget.addEventListener('click', (e) => {
      if (energy >= 10) {
        coins += 10;
        energy -= 10;
        
        coinsEl.innerText = coins.toLocaleString();
        energyEl.innerText = energy;
        saveData();

        // Plus 10 Floating Animation
        const floatingNum = document.createElement('div');
        floatingNum.className = 'floating-num';
        floatingNum.innerText = '+10';
        
        const rect = tapTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        floatingNum.style.left = `${x}px`;
        floatingNum.style.top = `${y}px`;
        
        tapTarget.appendChild(floatingNum);
        setTimeout(() => floatingNum.remove(), 800);
      }
    });

    // 4. Energy Regeneration Over Time
    setInterval(() => {
      if (energy < 1000) {
        energy = Math.min(1000, energy + 2);
        energyEl.innerText = energy;
        saveData();
      }
    }, 1000);

    // 5. Hamster Style Referral Link Share Function
    function shareReferralLink() {
      const refLink = `https://t.me/${BOT_USERNAME}?start=ref_${userTelegramId}`;
      const shareText = `🐸 Play Dogepepe with me and get 1,000,000 free coins!\n🎁 Join here:`;
      
      const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent(shareText)}`;

      if (tg && tg.openTelegramLink) {
        tg.openTelegramLink(shareUrl);
      } else {
        window.open(shareUrl, '_blank');
      }
    }

    // Upgrade PPH Test Feature
    function upgradePPH() {
      if (coins >= 50) {
        coins -= 50;
        pph += 100;
        coinsEl.innerText = coins.toLocaleString();
        pphEl.innerText = pph.toLocaleString();
        saveData();
      } else {
        alert("Not enough coins!");
      }
    }
  </script>
</body>
</html>
