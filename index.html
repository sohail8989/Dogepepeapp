<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogepepe Tap App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b101d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: #121829;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Top Header Stats */
        .stats-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: #1a2238;
            border: 1px solid #2a3554;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #8f9bba;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
            color: #00ff88;
            margin-top: 4px;
        }

        /* Value Banner ($200 per 1M coins) */
        .rate-banner {
            background: linear-gradient(90deg, rgba(255,170,0,0.15) 0%, rgba(255,215,0,0.25) 100%);
            border: 1px solid #ffaa00;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #ffcc00;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        /* Balance Display */
        .balance-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-title {
            font-size: 12px;
            color: #8f9bba;
            margin-bottom: 4px;
        }

        .main-balance {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Tap Area */
        .tap-area {
            position: relative;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle, #00ff88 0%, #008844 100%);
            padding: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tap-area:active {
            transform: scale(0.96);
        }

        .tap-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #121829;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .tap-avatar {
            font-size: 110px;
        }

        /* Energy & Actions Section */
        .actions-section {
            width: 100%;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .energy-bar-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #38ef7d;
            padding: 0 4px;
        }

        /* Referral Promo Card */
        .referral-card {
            background: linear-gradient(135deg, #1f2942 0%, #111726 100%);
            border: 1px dashed #3a4b73;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ref-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ref-title {
            font-size: 13px;
            font-weight: bold;
            color: #ffffff;
        }

        .ref-sub {
            font-size: 11px;
            color: #00ff88;
        }

        .ref-btn {
            background: #ffaa00;
            color: #000;
            font-weight: bold;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Buttons */
        .upgrade-btn {
            width: 100%;
            background: linear-gradient(90deg, #ff9900 0%, #ffcc00 100%);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }

        /* Floating +1 Text Animation */
        .tap-popup {
            position: absolute;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Top Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Supply</div>
            <div class="stat-value" style="color: #8f9bba;">420M</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Profit / Hour</div>
            <div class="stat-value" id="pph-value">+0</div>
        </div>
    </div>

    <!-- Live Rate Banner -->
    <div class="rate-banner">
        🔥 Est. Value: <span>1,000,000 Coins ≈ $200 USD</span>
    </div>

    <!-- Balance Section -->
    <div class="balance-container">
        <div class="balance-title">TOTAL BALANCE</div>
        <div class="main-balance">
            🐸 <span id="balance">0</span>
        </div>
    </div>

    <!-- Main Tap Button -->
    <div class="tap-area" id="tap-btn">
        <div class="tap-inner">
            <div class="tap-avatar">🐸</div>
        </div>
    </div>

    <!-- Bottom Actions & Info -->
    <div class="actions-section">
        
        <!-- Energy -->
        <div class="energy-bar-container">
            <span>⚡ Energy</span>
            <span id="energy">1000 / 1000</span>
        </div>

        <!-- Referral Bonus Card -->
        <div class="referral-card">
            <div class="ref-info">
                <div class="ref-title">👥 Invite 1 Friend</div>
                <div class="ref-sub">Get +1,000,000 Coins ($200)</div>
            </div>
            <button class="ref-btn" onclick="alert('Referral link copied!')">Invite</button>
        </div>

        <!-- Upgrade Button -->
        <button class="upgrade-btn" id="upgrade-btn">
            🚀 Upgrade PPH (Cost: 50)
        </button>
    </div>

</div>

<script>
    let balance = 0;
    let pph = 0;
    let energy = 1000;
    let maxEnergy = 1000;
    let upgradeCost = 50;

    const balanceEl = document.getElementById('balance');
    const pphEl = document.getElementById('pph-value');
    const energyEl = document.getElementById('energy');
    const tapBtn = document.getElementById('tap-btn');
    const upgradeBtn = document.getElementById('upgrade-btn');

    // Tap Function
    tapBtn.addEventListener('click', (e) => {
        if (energy > 0) {
            balance += 1;
            energy -= 1;
            updateUI();
            
            // Create Floating +1 Effect
            const rect = tapBtn.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'tap-popup';
            popup.innerText = '+1';
            popup.style.left = `${e.clientX - rect.left - 10}px`;
            popup.style.top = `${e.clientY - rect.top - 20}px`;
            tapBtn.appendChild(popup);

            setTimeout(() => popup.remove(), 800);
        }
    });

    // Upgrade PPH Function
    upgradeBtn.addEventListener('click', () => {
        if (balance >= upgradeCost) {
            balance -= upgradeCost;
            pph += 100; // Har upgrade par 100 PPH barhega
            upgradeCost = Math.floor(upgradeCost * 1.5); // Cost increase
            upgradeBtn.innerText = `🚀 Upgrade PPH (Cost: ${upgradeCost})`;
            updateUI();
        } else {
            alert('Not enough coins!');
        }
    });

    // Auto Energy Regeneration (1 per second)
    setInterval(() => {
        if (energy < maxEnergy) {
            energy += 1;
            updateUI();
        }
    }, 1000);

    // Passive Income (PPH per hour broken down to per second)
    setInterval(() => {
        if (pph > 0) {
            balance += Math.floor(pph / 3600) || 1;
            updateUI();
        }
    }, 1000);

    function updateUI() {
        balanceEl.innerText = balance.toLocaleString();
        pphEl.innerText = `+${pph.toLocaleString()}`;
        energyEl.innerText = `${energy} / ${maxEnergy}`;
    }
</script>

</body>
</html>
